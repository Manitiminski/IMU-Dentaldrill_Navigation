<svg id="target-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Target rings -->
  <circle cx="100" cy="100" r="90" class="ring" data-ring="4"/>
  <circle cx="100" cy="100" r="70" class="ring" data-ring="3"/>
  <circle cx="100" cy="100" r="50" class="ring" data-ring="2"/>
  <circle cx="100" cy="100" r="30" class="ring" data-ring="1"/>
  <circle cx="100" cy="100" r="10" class="ring" data-ring="0"/>
  
  <!-- Crosshair -->
  <g id="crosshair" transform="translate(100,100)">
    <line x1="-10" y1="0" x2="10" y2="0" stroke="black" stroke-width="2"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="black" stroke-width="2"/>
  </g>
</svg>
